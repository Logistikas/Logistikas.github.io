<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Žaidimo prototipas</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game">
    <p id="scene-progress" class="progress">Scena 1 / 1</p>
    <h1 id="scene-title">Žaidimo prototipas</h1>

    <div class="image-box">
      <img id="scene-image" src="" alt="" />
      <p id="image-placeholder" class="image-placeholder">
        Čia galėsi įkelti scenos nuotrauką (assets/images/...).
      </p>
    </div>

    <p id="scene-text">
      Sveikas atvykęs į žaidimą.
    </p>

    <div id="choices" class="choices"></div>

    <button id="restart-btn" class="restart">Pradėti iš naujo</button>
  </main>

  <script src="game.js"></script>
</body>
</html>
